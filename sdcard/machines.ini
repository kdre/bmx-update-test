# ---------------------------------------------------------------------------
# PET exact-frequency HDMI modes
# ---------------------------------------------------------------------------

# A 60 Hz editor ROM must be selected separately in vice.ini.
[video pet-ntsc-native]
label=768x525@60.060Hz
standard=NTSC
output=HDMI
disable_overscan=1
sdtv_mode=16
hdmi_group=2
hdmi_mode=87
# Exactly 16650 cycles per frame. Circle cycles/second is ignored for the
# actual PET pixel rate.
hdmi_timings=768 0 24 72 96 525 1 3 10 9 0 0 0 60 0 31538738 1
machine_timing=ntsc-custom
# PET is fixed at 1000000 cycles/sec; this value keeps BMPET in sync.
cycles_per_second=1014773

# A 50 Hz editor ROM must be selected separately in vice.ini.
[video pet-pal-native]
label=768x545@49.875Hz
standard=PAL
output=HDMI
disable_overscan=1
sdtv_mode=18
hdmi_group=2
hdmi_mode=87
# Exactly 20050 cycles per frame. Circle cycles/second is ignored for the
# actual PET pixel rate.
hdmi_timings=768 0 24 72 96 545 1 3 2 13 0 0 0 50 0 26956913 1
machine_timing=pal-custom
# PET is fixed at 1000000 cycles/sec; this value keeps BMPET in sync.
cycles_per_second=999096

