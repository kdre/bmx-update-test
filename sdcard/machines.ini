disable_overscan=1
sdtv_mode=18
hdmi_group=1
hdmi_mode=19
machine_timing=pal-composite

# ---------------------------------------------------------------------------
# VIC20 exact-frequency HDMI modes
# ---------------------------------------------------------------------------

# Matches the timing of a real NTSC VIC20 but may not work on all monitors.
[video vic20-ntsc-native]
label=768x525@60.285Hz
standard=NTSC
output=HDMI
disable_overscan=1
sdtv_mode=16
hdmi_group=2
hdmi_mode=87
hdmi_timings=768 0 24 72 96 525 1 3 10 9 0 0 0 60 0 31656857 1
machine_timing=ntsc-custom
# VICE cycles_per_second is 1022727; the custom mode is 0.000782% faster.
cycles_per_second=1022735

# Matches the timing of a real PAL VIC20 but may not work on all monitors.
[video vic20-pal-native]
label=768x545@50.037Hz
standard=PAL
output=HDMI
disable_overscan=1
sdtv_mode=18
hdmi_group=2
hdmi_mode=87
# 544 intended lines are represented as 545 with a shorter back porch so
# shader scanlines remain visible.
hdmi_timings=768 0 24 72 96 545 1 3 2 13 0 0 0 50 0 27043926 1
machine_timing=pal-custom
# VICE cycles_per_second is 1108405; the custom mode is 0.000632% faster.
cycles_per_second=1108412

