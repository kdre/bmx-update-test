# BMX machine and video configuration.
#
# The file has three independent concepts:
#
#   [video ID]     Physical output mode, exact refresh timing and clock.
#   [scaling ID]   Per-mode framebuffer and output rectangles.
#   [machine ID]   Modes and scaling sets available to an emulator.
#
# Video timing, cycles_per_second and a mode ID are applied atomically.
# scaling and scaling2 contain framebuffer_width,framebuffer_height,
# scaled_width,scaled_height. A missing scaling entry leaves that display at
# its normal runtime defaults.

format=1

# ---------------------------------------------------------------------------
# Shared standard HDMI and composite modes
# ---------------------------------------------------------------------------

[video pal-hdmi-576p]
label=576p@50Hz
standard=PAL
output=HDMI
disable_overscan=1
sdtv_mode=18
hdmi_group=2
hdmi_mode=87
hdmi_timings=720 0 12 64 68 576 0 5 5 39 0 0 0 50 0 27000000 3
machine_timing=pal-hdmi

[video ntsc-hdmi-480p]
label=480p@60Hz
standard=NTSC
output=HDMI
disable_overscan=1
sdtv_mode=16
hdmi_group=2
hdmi_mode=87
hdmi_timings=720 0 16 62 60 480 0 9 6 30 0 0 0 60 0 27027000 3
machine_timing=ntsc-hdmi

[video pal-hdmi-720p]
label=720p@50Hz
standard=PAL
output=HDMI
disable_overscan=1
sdtv_mode=18
hdmi_group=1
hdmi_mode=19
machine_timing=pal-hdmi

[video ntsc-hdmi-720p]
label=720p@60Hz
standard=NTSC
output=HDMI
disable_overscan=1
sdtv_mode=16
