format = "bmx-sd-layout-v1"
default = "deny"

# Entry syntax: `from` is alias/relative-source, `to` is the final SD path.
# Scopes are `both`, `pi4` and `pi5`; `file`, `tree` and `directory` are the
# only entry kinds. Modes are: replace=BMX system file, kernel=stable machine
# kernel, config=local configuration template, metadata=release metadata,
# keep=preserve existing user/local content. A missing `from` declares only a
# device-side update rule and never stages a file.

# Source aliases are host-side only.  A caller binds the values in braces or
# overrides an alias directly; no machine-local absolute path is committed.
[sources]
repo = "{repo}"
sdcard = "{repo}/sdcard"
vice = "{repo}/third_party/vice-3.10"
vice_data = "{repo}/third_party/vice-3.10/data"
raspi_keymaps = "{repo}/tools/keymaps/raspi"
wlan = "{repo}/third_party/raspberrypi-firmware/wlan"
pi4_boot = "{repo}/third_party/raspberrypi-firmware/boot/pi4"
pi5_boot = "{repo}/third_party/raspberrypi-firmware/boot/pi5"
firmware_boot = "{repo}/third_party/raspberrypi-firmware/boot"
miniz = "{repo}/third_party/miniz"
utils_disk = "{repo}/utils-disk"
generated = "{generated_root}/{board}"
kernels = "{kernels_root}/{board}"
roms = "{roms_root}"

# Generated board files.  Generators write only to the private generated root;
# this layout is the sole authority that may place them on the SD stage.
[[both.file]]
from = "generated/config.txt"
to = "config.txt"
mode = "config"

[[both.file]]
from = "generated/cmdline.txt"
to = "cmdline.txt"
mode = "config"

[[both.file]]
from = "generated/bmx-active-kernel.txt"
to = "bmx-active-kernel.txt"
mode = "config"

[[both.file]]
from = "sdcard/machines.ini"
to = "machines.ini"
mode = "config"

[[both.file]]
from = "generated/BMX-BUILD.json"
to = "BMX-BUILD.json"
mode = "metadata"
optional = true

[[both.file]]
from = "generated/BUILD-PROFILE.txt"
to = "BUILD-PROFILE.txt"
mode = "metadata"

[[both.file]]
from = "generated/MISSING-ROMS.txt"
to = "MISSING-ROMS.txt"
mode = "metadata"
optional = true

[[both.file]]
from = "generated/UART-DEBUG.txt"
to = "UART-DEBUG.txt"
mode = "metadata"
profiles = ["debug"]

